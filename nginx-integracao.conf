server {
    listen 80;
    server_name localhost;

    # Handle /integracao without trailing slash
    location = /integracao {
        return 301 /integracao/;
    }

    location /integracao/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /integracao/index.html;
    }

    # Redirect / to /integracao/ just in case
    location = / {
        return 301 /integracao/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
